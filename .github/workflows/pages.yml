name: Deploy Demo naar GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'demo/**'
      - 'wled00/data/index.htm'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy naar Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pages instellen
        uses: actions/configure-pages@v5

      - name: Demo klaarzetten
        run: |
          mkdir -p _site
          cp demo/index.html _site/index.html
          echo "Demo klaar voor deployment"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
