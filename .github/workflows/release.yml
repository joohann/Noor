name: Build & Release Noor

on:
  push:
    tags:
      - 'v*.*.*'

env:
  WLED_VERSION: v0.15.0-b7
  WLED_ENV: esp32s3dev_8MB_opi
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Noor
        uses: actions/checkout@v4
        with:
          path: noor

      - name: Checkout WLED
        uses: actions/checkout@v4
        with:
          repository: Aircoookie/WLED
          ref: ${{ env.WLED_VERSION }}
          path: WLED

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO installeren
        run: pip install platformio

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Versie bepalen
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Noor GUI installeren
        run: |
          sed -i "s/const CURRENT_VERSION = '[^']*'/const CURRENT_VERSION = '${{ steps.version.outputs.VERSION }}'/" \
            noor/wled00/data/index.htm
          cp noor/wled00/data/index.htm WLED/wled00/data/index.htm
          echo "GUI gekopieerd"

          python3 -c "
          lines = [
              '[platformio]',
              'default_envs = ${{ env.WLED_ENV }}',
          ]
          open('WLED/platformio_override.ini', 'w').write('\n'.join(lines) + '\n')
          print('override aangemaakt')
          "

      - name: WLED web UI bouwen (genereert html_ui.h)
        working-directory: WLED
        run: |
          npm install
          npm run build

      - name: Firmware compileren
        working-directory: WLED
        run: pio run -e ${{ env.WLED_ENV }}

      - name: Binary + ELF klaarzetten
        run: |
          mkdir -p release
          cp WLED/.pio/build/${{ env.WLED_ENV }}/firmware.bin \
            release/noor-${{ steps.version.outputs.VERSION }}-esp32s3-8mb.bin
          cp WLED/.pio/build/${{ env.WLED_ENV }}/firmware.elf \
            release/noor-${{ steps.version.outputs.VERSION }}-esp32s3-8mb.elf
          ls -lh release/

      - name: Wokwi simulatie bestanden klaarzetten
        run: |
          mkdir -p release/wokwi
          cp noor/wokwi/diagram.json release/wokwi/diagram.json

          # wokwi.toml met correcte bestandsnamen voor deze versie
          cat > release/wokwi/wokwi.toml << EOF
          [wokwi]
          version = 1
          firmware = noor-${{ steps.version.outputs.VERSION }}-esp32s3-8mb.bin
          elf = noor-${{ steps.version.outputs.VERSION }}-esp32s3-8mb.elf
          EOF

          echo ""
          echo "Wokwi simulatie:"
          echo "https://wokwi.com/projects/new/esp32-s3"
          echo "Upload de .bin en .elf uit deze release + diagram.json + wokwi.toml"

      - name: GitHub Release aanmaken
        uses: softprops/action-gh-release@v2
        with:
          name: "Noor v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Noor v${{ steps.version.outputs.VERSION }}

            ### Installeren
            Flash `noor-${{ steps.version.outputs.VERSION }}-esp32s3-8mb.bin` via de WLED web updater of esptool.

            ### Simuleren (Wokwi)
            1. Ga naar [wokwi.com](https://wokwi.com/projects/new/esp32-s3)
            2. Upload de `.bin` en `.elf` bestanden uit deze release
            3. Kopieer `diagram.json` en `wokwi.toml` uit de `wokwi/` map

            Zie [CHANGELOG.md](https://github.com/joohann/noor/blob/main/CHANGELOG.md) voor wijzigingen.
          files: |
            release/noor-${{ steps.version.outputs.VERSION }}-esp32s3-8mb.bin
            release/noor-${{ steps.version.outputs.VERSION }}-esp32s3-8mb.elf
            release/wokwi/diagram.json
            release/wokwi/wokwi.toml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
