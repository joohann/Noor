name: Build & Release Noor

on:
  push:
    tags:
      - 'v*.*.*'

env:
  WLED_VERSION: v0.15.0-b7
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Noor
        uses: actions/checkout@v4
        with:
          path: noor

      - name: Checkout WLED
        uses: actions/checkout@v4
        with:
          repository: Aircoookie/WLED
          ref: ${{ env.WLED_VERSION }}
          path: WLED

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO installeren
        run: pip install platformio

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Versie bepalen
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Noor GUI installeren
        run: |
          sed -i "s/const CURRENT_VERSION = '[^']*'/const CURRENT_VERSION = '${{ steps.version.outputs.VERSION }}'/" \
            noor/wled00/data/index.htm
          cp noor/wled00/data/index.htm WLED/wled00/data/index.htm
          echo "GUI gekopieerd"
          python3 -c "
          open('WLED/platformio_override.ini', 'w').write('[platformio]\ndefault_envs = nodemcuv2\n')
          print('override aangemaakt')
          "
          cat WLED/platformio_override.ini

      - name: Firmware compileren
        working-directory: WLED
        run: pio run -e nodemcuv2

      - name: Binary klaarzetten
        run: |
          mkdir -p release
          cp WLED/.pio/build/nodemcuv2/firmware.bin \
            release/noor-${{ steps.version.outputs.VERSION }}-esp8266.bin
          ls -lh release/

      - name: GitHub Release aanmaken
        uses: softprops/action-gh-release@v2
        with:
          name: "Noor v${{ steps.version.outputs.VERSION }}"
          body_path: noor/CHANGELOG.md
          files: release/noor-${{ steps.version.outputs.VERSION }}-esp8266.bin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
