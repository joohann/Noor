name: Build & Release Noor

on:
  push:
    tags:
      - 'v*.*.*'   # trigger op elke versie-tag zoals v1.1.0

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
      # ── 1. Noor repo ophalen ─────────────────────────────
      - name: Checkout Noor
        uses: actions/checkout@v4
        with:
          path: noor

      # ── 2. WLED broncode ophalen ─────────────────────────
      - name: Checkout WLED
        uses: actions/checkout@v4
        with:
          repository: Aircoookie/WLED
          ref: main
          path: WLED

      # ── 3. Noor GUI over WLED leggen ─────────────────────
      - name: Noor over WLED leggen
        run: |
          cp noor/wled00/data/index.htm WLED/wled00/data/index.htm
          cp noor/platformio.ini        WLED/platformio.ini
          echo "Noor GUI gekopieerd naar WLED"

      # ── 4. Python + PlatformIO installeren ───────────────
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO installeren
        run: pip install platformio

      # ── 5. Node.js voor WLED web UI build ────────────────
      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 6. Versienummer uit de tag halen ─────────────────
      - name: Versie bepalen
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── 7. Versienummer in de GUI injecteren ─────────────
      - name: Versie in GUI zetten
        run: |
          sed -i "s/const CURRENT_VERSION = '[^']*'/const CURRENT_VERSION = '${{ steps.version.outputs.VERSION }}'/" \
            WLED/wled00/data/index.htm
          echo "GUI versie: ${{ steps.version.outputs.VERSION }}"

      # ── 8. Firmware bouwen ───────────────────────────────
      - name: Firmware compileren
        working-directory: WLED
        run: platformio run -e d1_mini

      # ── 9. .bin hernoemen met versienummer ───────────────
      - name: Binary klaarzetten
        run: |
          mkdir -p release
          cp WLED/.pio/build/d1_mini/firmware.bin \
            release/noor-${{ steps.version.outputs.VERSION }}-d1_mini.bin
          echo "Binary: noor-${{ steps.version.outputs.VERSION }}-d1_mini.bin"

      # ── 10. GitHub Release aanmaken met .bin als asset ───
      - name: GitHub Release aanmaken
        uses: softprops/action-gh-release@v2
        with:
          name: "Noor v${{ steps.version.outputs.VERSION }}"
          body_path: noor/CHANGELOG.md
          files: release/noor-${{ steps.version.outputs.VERSION }}-d1_mini.bin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
