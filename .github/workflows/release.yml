name: Build & Release Noor

on:
  push:
    tags:
      - 'v*.*.*'

env:
  WLED_VERSION: v0.15.0-b7

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
      # ── 1. Noor repo ophalen ─────────────────────────────
      - name: Checkout Noor
        uses: actions/checkout@v4
        with:
          path: noor

      # ── 2. WLED broncode ophalen (vaste stabiele versie) ─
      - name: Checkout WLED
        uses: actions/checkout@v4
        with:
          repository: Aircoookie/WLED
          ref: ${{ env.WLED_VERSION }}
          path: WLED

      # ── 3. Python + PlatformIO ───────────────────────────
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO installeren
        run: pip install platformio

      # ── 4. Node.js (voor WLED UI tools) ─────────────────
      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 5. Versienummer uit de tag halen ─────────────────
      - name: Versie bepalen
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── 6. Noor GUI over WLED leggen ─────────────────────
      - name: Noor GUI installeren
        run: |
          sed -i "s/const CURRENT_VERSION = '[^']*'/const CURRENT_VERSION = '${{ steps.version.outputs.VERSION }}'/" \
            noor/wled00/data/index.htm
          cp noor/wled00/data/index.htm WLED/wled00/data/index.htm
          echo "GUI versie ${{ steps.version.outputs.VERSION }} gekopieerd"
          python3 -c "
          lines = [
              '[platformio]',
              'default_envs = d1_mini',
              '',
              '[env:d1_mini]',
          ]
          with open('WLED/platformio_override.ini', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('platformio_override.ini aangemaakt')
          "
          cat WLED/platformio_override.ini

      # ── 7. Firmware compileren ───────────────────────────
      - name: Firmware compileren
        working-directory: WLED
        run: pio run -e d1_mini

      # ── 8. Binary klaarzetten ────────────────────────────
      - name: Binary klaarzetten
        run: |
          mkdir -p release
          cp WLED/.pio/build/d1_mini/firmware.bin \
            release/noor-${{ steps.version.outputs.VERSION }}-d1_mini.bin
          ls -lh release/

      # ── 9. GitHub Release aanmaken ───────────────────────
      - name: GitHub Release aanmaken
        uses: softprops/action-gh-release@v2
        with:
          name: "Noor v${{ steps.version.outputs.VERSION }}"
          body_path: noor/CHANGELOG.md
          files: release/noor-${{ steps.version.outputs.VERSION }}-d1_mini.bin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
