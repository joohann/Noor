;
; LET OP: dit bestand wordt NIET gebruikt
; door GitHub Actions of het setup script.
;
; GitHub Actions gebruikt WLED's eigen
; platformio.ini + een kleine override
; (alleen default_envs = d1_mini).
;
; Voor lokaal compileren: gebruik setup-mac.sh
; Dat script kloont WLED en legt de Noor GUI
; er automatisch overheen.
; ────────────────────────────────────────

; OTA update vanaf je Mac (na eerste flash):
; Pas het IP aan en run: pio run -e d1_mini_ota -t upload
; (vanuit de ~/noor-build/WLED map)
;
; [env:d1_mini_ota]
; extends = env:d1_mini
; upload_protocol = espota
; upload_port = 192.168.1.XXX
