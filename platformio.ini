; ────────────────────────────────────────
; Noor — WLED met custom Aquarium UI
; github.com/joohann/noor
; ────────────────────────────────────────

[platformio]
default_envs = d1_mini

[env:d1_mini]
board = d1_mini
platform = espressif8266@4.2.1
framework = arduino

; WLED gebruikt wled00 als source map, niet src
src_dir  = wled00
data_dir = wled00/data

build_flags =
  ${env.build_flags}
  -D WLED_RELEASE_NAME='"Noor"'

board_build.flash_mode = dout
board_build.ldscript = eagle.flash.4m1m.ld

upload_speed = 921600
monitor_speed = 115200

; ── OTA update omgeving ──
[env:d1_mini_ota]
extends = env:d1_mini
upload_protocol = espota
upload_port = 192.168.1.XXX   ; vervang met jouw ESP IP
