[platformio]
default_envs = d1_mini

; ────────────────────────────────────────
; Noor — WLED met custom Aquarium UI
; github.com/joohann/noor
; ────────────────────────────────────────

[env:d1_mini]
board = d1_mini
platform = espressif8266@4.2.1
framework = arduino

; WLED broncode
src_dir = wled00
data_dir = wled00/data

build_flags =
  -D WLED_RELEASE_NAME='"Noor"'
  -D WLED_VERSION='"1.0.3"'
  ; SK6812 RGBW standaard aan
  -D DEFAULT_LED_TYPE=22
  ; Geen seriële debug in release
  -D WLED_DISABLE_BROWNOUT_DET

board_build.flash_mode = dout
board_build.ldscript = eagle.flash.4m1m.ld

upload_speed = 921600
monitor_speed = 115200

lib_deps =
  ; WLED dependencies — zelfde als upstream WLED
  fastled/FastLED @ 3.6.0
  IRremoteESP8266
  https://github.com/Aircoookie/ESPAsyncWebServer.git
  https://github.com/me-no-dev/ESPAsyncTCP.git
  Wire

; ── extra omgeving voor OTA updates ──
[env:d1_mini_ota]
extends = env:d1_mini
upload_protocol = espota
upload_port = 192.168.1.XXX   ; vervang met jouw ESP IP
